<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Talos Control Panel</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <script>
      // Apply the saved theme before first paint, so there's no flash of the
      // wrong theme on load. Defaults to "dark" for a first-time visitor.
      (function () {
        var saved = localStorage.getItem("talos-cp-theme");
        document.documentElement.setAttribute("data-theme", saved || "dark");
      })();
    </script>
  </head>
  <body class="bg-base-100">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
